<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="WebVR Solar System — immersive 360° space experience with A-Frame.">
  <title>WebVR Solar System | TY Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #04040f; overflow: hidden; }

    #vr-hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      padding: 14px 18px; display: flex; align-items: center;
      justify-content: space-between; pointer-events: none;
    }
    .vr-btn {
      pointer-events: all;
      padding: 9px 18px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(4,4,15,0.75); backdrop-filter: blur(14px);
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .vr-btn:hover { background: rgba(124,58,237,0.5); transform: translateY(-2px); }
    #vr-title {
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
    }

    /* Info panel (DOM overlay for VR) */
    #vr-info {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      border-radius: 24px 24px 0 0;
      background: linear-gradient(180deg, rgba(20,8,50,0.97) 0%, rgba(4,4,15,0.99) 100%);
      border-top: 1px solid rgba(124,58,237,0.4);
      backdrop-filter: blur(24px);
      max-height: 75vh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    #vr-info.open { transform: translateY(0); }
    .v-handle { width: 44px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.18); margin: 14px auto 0; }
    .v-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px 8px; }
    .v-icon { font-size: 2.8rem; filter: drop-shadow(0 0 14px rgba(180,130,255,0.6)); }
    .v-title-group { flex: 1; padding: 0 14px; }
    .v-planet-name {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, #c084fc, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .v-planet-type { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .v-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .v-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 22px; }
    .v-stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 13px 15px; }
    .v-stat-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .v-stat-value { font-size: 1rem; font-weight: 700; color: #f0f0ff; }
    .v-fact { margin: 4px 22px 20px; padding: 15px 18px; background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(37,99,235,0.12)); border: 1px solid rgba(124,58,237,0.28); border-radius: 14px; }
    .v-fact-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #a78bfa; margin-bottom: 7px; }
    .v-fact-text { font-size: 0.88rem; color: rgba(255,255,255,0.78); line-height: 1.65; }

    /* Gaze tip */
    #gaze-tip {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      padding: 11px 24px; background: rgba(4,4,15,0.82); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px; backdrop-filter: blur(14px);
      font-size: 0.82rem; color: rgba(255,255,255,0.65); white-space: nowrap; z-index: 500;
    }
    .g-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a78bfa; margin-right: 8px; animation: gblink 1.4s ease infinite; }
    @keyframes gblink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<!-- HUD -->
<div id="vr-hud">
  <button class="vr-btn" onclick="location.href='index.html'">← Hub</button>
  <span id="vr-title">🪐 Solar System VR</span>
  <button class="vr-btn" id="vr-mode-btn" onclick="toggleVR()">🥽 VR Mode</button>
</div>

<!-- Gaze tip -->
<div id="gaze-tip"><span class="g-dot"></span> Look at a planet to select it, then tap</div>

<!-- Planet Info Panel -->
<div id="vr-info" role="dialog" aria-modal="true">
  <div class="v-handle"></div>
  <div class="v-header">
    <div id="vi-icon" class="v-icon">🪐</div>
    <div class="v-title-group">
      <div id="vi-name" class="v-planet-name">Planet</div>
      <div id="vi-type" class="v-planet-type">Type</div>
    </div>
    <button class="v-close" onclick="closePanel()">✕</button>
  </div>
  <div id="vi-stats" class="v-stats"></div>
  <div class="v-fact">
    <div class="v-fact-label">⚡ Did You Know?</div>
    <p id="vi-fact" class="v-fact-text"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     A-FRAME VR SCENE
     ═══════════════════════════════════════════════════ -->
<a-scene
  id="vr-scene"
  background="color: #04040f"
  renderer="colorManagement: true; antialias: true;"
  vr-mode-ui="enabled: true"
>

  <!-- STARS (particle field) -->
  <a-entity id="stars"></a-entity>

  <!-- SKYBOX gradient -->
  <a-sky color="#04040f"></a-sky>

  <!-- LIGHTING -->
  <a-light type="ambient" color="#111133" intensity="0.7"></a-light>
  <a-light type="point"   position="0 0 0" color="#FFF9E0" intensity="5" distance="60" decay="1.8"></a-light>

  <!-- ── SUN ── -->
  <a-sphere id="vr-sun" class="vr-planet" data-planet="sun"
    position="0 1.6 0" radius="1.6"
    material="color:#FFD700; emissive:#FF8C00; emissiveIntensity:1.4; shader:flat"
    animation="property:rotation; to:0 360 0; loop:true; dur:20000; easing:linear">
  </a-sphere>
  <!-- Sun glow -->
  <a-sphere position="0 1.6 0" radius="1.9"
    material="color:#FFA500; opacity:0.12; transparent:true; shader:flat; blending:additive; depthWrite:false"
    animation="property:scale; from:1 1 1; to:1.06 1.06 1.06; dir:alternate; loop:true; dur:1800; easing:easeInOutSine">
  </a-sphere>

  <!-- ── MERCURY  r=4 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:5000; easing:linear">
    <a-sphere class="vr-planet" data-planet="mercury"
      position="4 1.6 0" radius="0.22"
      material="color:#AAAAAA; emissive:#555; emissiveIntensity:0.3">
    </a-sphere>
  </a-entity>

  <!-- ── VENUS  r=6.5 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:9000; easing:linear">
    <a-sphere class="vr-planet" data-planet="venus"
      position="6.5 1.6 0" radius="0.38"
      material="color:#E8D5A3; emissive:#C4A352; emissiveIntensity:0.3">
    </a-sphere>
  </a-entity>

  <!-- ── EARTH + MOON  r=9 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:14000; easing:linear">
    <a-entity position="9 1.6 0">
      <a-sphere class="vr-planet" data-planet="earth"
        radius="0.42"
        material="color:#3A8F5F; emissive:#1E5FA0; emissiveIntensity:0.4"
        animation="property:rotation; to:0 360 0; loop:true; dur:3000; easing:linear">
      </a-sphere>
      <!-- Moon -->
      <a-entity animation="property:rotation; to:0 360 0; loop:true; dur:3500; easing:linear">
        <a-sphere position="0.8 0 0" radius="0.11"
          material="color:#CCCCCC; emissive:#888; emissiveIntensity:0.2">
        </a-sphere>
      </a-entity>
    </a-entity>
  </a-entity>

  <!-- ── MARS  r=12 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:21000; easing:linear">
    <a-sphere class="vr-planet" data-planet="mars"
      position="12 1.6 0" radius="0.32"
      material="color:#CC3300; emissive:#AA1100; emissiveIntensity:0.38">
    </a-sphere>
  </a-entity>

  <!-- ── JUPITER  r=17 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:38000; easing:linear">
    <a-sphere class="vr-planet" data-planet="jupiter"
      position="17 1.6 0" radius="0.95"
      material="color:#C88B3A; emissive:#885522; emissiveIntensity:0.2"
      animation="property:rotation; to:0 360 0; loop:true; dur:1800; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- ── SATURN + RINGS  r=23 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:55000; easing:linear">
    <a-entity class="vr-planet" data-planet="saturn" position="23 1.6 0">
      <a-sphere radius="0.78"
        material="color:#EADDCA; emissive:#A07840; emissiveIntensity:0.22"
        animation="property:rotation; to:0 360 0; loop:true; dur:2000; easing:linear">
      </a-sphere>
      <a-ring radius-inner="1.05" radius-outer="1.9" color="#B8966E" rotation="-70 0 0"
        material="opacity:0.72; transparent:true; side:double; shader:flat">
      </a-ring>
      <a-ring radius-inner="1.91" radius-outer="2.2" color="#9B8060" rotation="-70 0 0"
        material="opacity:0.35; transparent:true; side:double; shader:flat">
      </a-ring>
    </a-entity>
  </a-entity>

  <!-- ── URANUS  r=29 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:72000; easing:linear">
    <a-sphere class="vr-planet" data-planet="uranus"
      position="29 1.6 0" radius="0.62"
      material="color:#7FDBFF; emissive:#1a8fa8; emissiveIntensity:0.3">
    </a-sphere>
  </a-entity>

  <!-- ── NEPTUNE  r=35 ── -->
  <a-entity class="vr-orbit" animation="property:rotation; to:0 360 0; loop:true; dur:90000; easing:linear">
    <a-sphere class="vr-planet" data-planet="neptune"
      position="35 1.6 0" radius="0.58"
      material="color:#4169E1; emissive:#1540a0; emissiveIntensity:0.35">
    </a-sphere>
  </a-entity>

  <!-- ── CAMERA with gaze cursor ── -->
  <a-entity id="rig" position="0 0 18">
    <a-entity id="vr-camera" camera look-controls wasd-controls="enabled:true">
      <!-- Gaze cursor (fuse for Cardboard) -->
      <a-entity
        cursor="fuse: true; fuseTimeout: 1500"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018"
        material="color: white; shader: flat; opacity: 0.85"
        raycaster="far: 80; objects: .vr-planet"
        animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
        animation__fuse="property: scale; startEvents: fusing; from: 1 1 1; to: 0.5 0.5 0.5; dur: 1500"
        animation__unfuse="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 200">
      </a-entity>
    </a-entity>
  </a-entity>

</a-scene>

<script>
// ── Planet Data ──────────────────────────────────────────
const VR_PLANETS = {
  sun:     { name:'The Sun',  icon:'☀️', type:'G-Type Star',         stats:[{l:'Diameter',v:'1,392,700 km'},{l:'Surface Temp',v:'5,500 °C'},{l:'Age',v:'4.6 Billion yrs'},{l:'Mass',v:'1.989×10³⁰ kg'}], fact:'The Sun accounts for 99.86% of all Solar System mass. Its core fuses 620 million tonnes of hydrogen every second.' },
  mercury: { name:'Mercury', icon:'🪨', type:'Terrestrial Planet',   stats:[{l:'Diameter',v:'4,879 km'},{l:'Day Length',v:'58.6 Earth days'},{l:'Year Length',v:'88 Earth days'},{l:'Avg Temp',v:'-80 to 430°C'}], fact:'Mercury has no atmosphere — temperatures swing 510°C between day and night.' },
  venus:   { name:'Venus',   icon:'🌕', type:'Terrestrial Planet',   stats:[{l:'Diameter',v:'12,104 km'},{l:'Day Length',v:'243 Earth days'},{l:'Year Length',v:'225 Earth days'},{l:'Avg Temp',v:'465°C'}], fact:'Venus rotates backwards and its day is longer than its year. Hottest planet despite not being closest.' },
  earth:   { name:'Earth',   icon:'🌍', type:'Terrestrial Planet',   stats:[{l:'Diameter',v:'12,742 km'},{l:'Day Length',v:'24 hours'},{l:'Year Length',v:'365.25 days'},{l:'Avg Temp',v:'15°C'}], fact:'Earth is the densest planet and only one known to support life. 71% of its surface is liquid water.' },
  mars:    { name:'Mars',    icon:'🔴', type:'Terrestrial Planet',   stats:[{l:'Diameter',v:'6,779 km'},{l:'Day Length',v:'24.6 hours'},{l:'Year Length',v:'687 Earth days'},{l:'Avg Temp',v:'-63°C'}], fact:'Mars has the tallest volcano in the Solar System — Olympus Mons at 22 km high.' },
  jupiter: { name:'Jupiter', icon:'🪐', type:'Gas Giant',            stats:[{l:'Diameter',v:'139,820 km'},{l:'Day Length',v:'9.9 hours'},{l:'Year Length',v:'11.9 Earth yrs'},{l:'Moons',v:'95+'}], fact:'Jupiter\'s Great Red Spot is a storm raging for over 350 years — big enough to swallow 3 Earths.' },
  saturn:  { name:'Saturn',  icon:'🪐', type:'Gas Giant',            stats:[{l:'Diameter',v:'116,460 km'},{l:'Day Length',v:'10.7 hours'},{l:'Year Length',v:'29.5 Earth yrs'},{l:'Ring Span',v:'282,000 km'}], fact:'Saturn is less dense than water — it would float in a giant bathtub! Its rings are 90–95% pure ice.' },
  uranus:  { name:'Uranus',  icon:'🔵', type:'Ice Giant',            stats:[{l:'Diameter',v:'50,724 km'},{l:'Day Length',v:'17.2 hours'},{l:'Year Length',v:'84 Earth yrs'},{l:'Avg Temp',v:'-195°C'}], fact:'Uranus rotates on its side — its axial tilt is 98°. It\'s the coldest planetary atmosphere in the Solar System.' },
  neptune: { name:'Neptune', icon:'💙', type:'Ice Giant',            stats:[{l:'Diameter',v:'49,244 km'},{l:'Day Length',v:'16 hours'},{l:'Year Length',v:'165 Earth yrs'},{l:'Wind Speed',v:'2,100 km/h'}], fact:'Neptune has the fastest winds in the Solar System at over 2,100 km/h — faster than the speed of sound on Earth.' },
};

// ── Star Field ───────────────────────────────────────────
const scene = document.querySelector('a-scene');
scene.addEventListener('loaded', () => {
  const starContainer = document.getElementById('stars');
  for (let i = 0; i < 800; i++) {
    const star = document.createElement('a-sphere');
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 80 + Math.random() * 40;
    star.setAttribute('position', {
      x: r * Math.sin(phi) * Math.cos(theta),
      y: r * Math.cos(phi),
      z: r * Math.sin(phi) * Math.sin(theta)
    });
    const size = 0.04 + Math.random() * 0.12;
    star.setAttribute('radius', size);
    const bright = Math.floor(180 + Math.random() * 75);
    star.setAttribute('material', `color: rgb(${bright},${bright},${bright}); shader: flat; opacity: ${0.5 + Math.random() * 0.5}; transparent: true`);
    starContainer.appendChild(star);
  }
});

// ── Planet click handler ─────────────────────────────────
document.querySelectorAll('.vr-planet').forEach(el => {
  el.addEventListener('click', () => {
    const key = el.getAttribute('data-planet');
    if (key && VR_PLANETS[key]) openPanel(key);
  });
  el.addEventListener('mouseenter', () => {
    el.setAttribute('animation__hover', 'property:scale; to:1.2 1.2 1.2; dur:250; easing:easeOutSine');
  });
  el.addEventListener('mouseleave', () => {
    el.setAttribute('animation__hover', 'property:scale; to:1 1 1; dur:250; easing:easeOutSine');
  });
});

// Wait for scene to load before attaching planet events
scene.addEventListener('loaded', () => {
  document.querySelectorAll('.vr-planet').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.getAttribute('data-planet');
      if (key && VR_PLANETS[key]) openPanel(key);
    });
  });
});

function openPanel(key) {
  const p = VR_PLANETS[key];
  document.getElementById('vi-icon').textContent = p.icon;
  document.getElementById('vi-name').textContent = p.name;
  document.getElementById('vi-type').textContent = p.type;
  document.getElementById('vi-stats').innerHTML = p.stats.map(s =>
    `<div class="v-stat"><div class="v-stat-label">${s.l}</div><div class="v-stat-value">${s.v}</div></div>`
  ).join('');
  document.getElementById('vi-fact').textContent = p.fact;
  document.getElementById('vr-info').classList.add('open');
  document.getElementById('gaze-tip').style.display = 'none';
}

function closePanel() {
  document.getElementById('vr-info').classList.remove('open');
  document.getElementById('gaze-tip').style.display = 'block';
}

// Swipe to close panel
let ty0 = 0;
document.getElementById('vr-info').addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive: true });
document.getElementById('vr-info').addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - ty0 > 60) closePanel(); }, { passive: true });

// VR mode toggle
function toggleVR() {
  const sc = document.getElementById('vr-scene');
  if (sc.is('vr-mode')) sc.exitVR();
  else sc.enterVR();
}
</script>
</body>
</html>
